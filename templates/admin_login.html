<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f3ef;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 10px;
      text-align: center;
    }
    p {
      text-align: center;
      color: #6a625a;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d8d0c8;
      margin-bottom: 14px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #1b1b1b;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .err {
      background: #fde9e7;
      color: #a52e25;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin Panel</h1>
    <p>Inserisci la password per accedere.</p>

    {% if error %}
      <div class="err">{{ error }}</div>
    {% endif %}

    <form method="post">
      <input type="password" name="password" placeholder="Password admin" required>
      <button type="submit">Accedi</button>
    </form>
  </div>
</body>
</html>
